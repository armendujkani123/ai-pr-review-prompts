name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test CLI
        run: python pr_review_cli.py --title "Refactor checkout flow" --summary "Moves discount logic into a service object" --mode general > /tmp/review.txt && test -s /tmp/review.txt
